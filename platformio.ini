; ============================================================
; PLATFORMIO CONFIGURATION FILE
; Project: Poste Inteligente v6
; Framework: ESP-IDF
; ============================================================

[platformio]
src_dir = main
default_envs = esp32dev

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = espidf

; Velocidades de comunicação
monitor_speed = 115200
upload_speed  = 921600

; Configuração do CMake para encontrar os teus componentes
board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components

; Garante que o PlatformIO usa o toolchain Xtensa e não o GCC do sistema
platform_packages =
    toolchain-xtensa-esp32

; Flags de Compilação
; Removemos o LV_CONF_PATH daqui para evitar o erro "redefined"
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_SUPPRESS_DEFINE_CHECK
    -I components/lvgl
    -I components/display_manager
    -I components/display_driver
    -I components/config
    
   
    
; Filtros do Monitor para melhor depuração
monitor_filters = esp32_exception_decoder, time
build_src_filter = +<*> -<components/lvgl/examples/>