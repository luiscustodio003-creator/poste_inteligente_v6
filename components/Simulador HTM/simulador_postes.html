<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador — Postes Inteligentes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e5e5e5;padding:16px;min-height:100vh}
h1{font-size:16px;font-weight:500;color:#fff;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:16px}
.road{background:#1a1a1a;border:1px solid #333;border-radius:8px;position:relative;height:88px;margin:8px 0;overflow:hidden}
.road-line{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:repeating-linear-gradient(90deg,#555 0,#555 20px,transparent 20px,transparent 40px);width:100%}
.post-row{display:flex;gap:8px;align-items:stretch}
.post-card{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px;min-width:0}
.post-card.offline{opacity:0.4;border-style:dashed}
.post-name{font-size:13px;font-weight:500;color:#fff}
.badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;margin-left:4px}
.b-idle{background:#27272a;color:#a1a1aa}
.b-light{background:#422006;color:#fbbf24}
.b-safe{background:#431407;color:#fb923c}
.b-master{background:#052e16;color:#4ade80}
.b-auto{background:#450a0a;color:#f87171}
.b-off{background:#111;color:#555}
.dali-bar{height:6px;border-radius:3px;background:#333;margin:5px 0}
.dali-fill{height:100%;border-radius:3px;transition:width 0.4s,background 0.4s}
.counters{display:flex;gap:6px;margin-top:6px}
.cnt{flex:1;background:#111;border-radius:6px;padding:4px 6px;text-align:center}
.cnt-lbl{font-size:9px;color:#666}
.cnt-val{font-size:18px;font-weight:500;line-height:1.2}
.neb-row{display:flex;justify-content:space-between;font-size:10px;margin-top:5px}
.neb-ok{color:#22c55e}
.neb-off{color:#ef4444}
.section-title{font-size:11px;font-weight:500;color:#666;margin:12px 0 4px;text-transform:uppercase;letter-spacing:0.06em}
.car-dot{position:absolute;top:50%;transform:translateY(-50%);width:20px;height:13px;background:#fff;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#111;font-weight:700}
.radar-zone{position:absolute;top:0;height:100%;background:rgba(250,204,21,0.08);border-left:1px dashed rgba(250,204,21,0.4);border-right:1px dashed rgba(250,204,21,0.4)}
.post-pole{position:absolute;bottom:0;width:4px;background:#666;border-radius:2px 2px 0 0}
.post-light{position:absolute;width:14px;height:7px;border-radius:2px;transition:background 0.3s}
.ctrl-section{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;margin:8px 0}
button{background:#111;color:#e5e5e5;border:1px solid #444;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
button:hover{background:#222;border-color:#666}
button.active-fail{background:#450a0a;color:#f87171;border-color:#7f1d1d}
input[type=range]{accent-color:#facc15;vertical-align:middle}
.log-box{background:#000;border:1px solid #222;border-radius:8px;padding:10px;font-size:11px;font-family:'Courier New',monospace;height:150px;overflow-y:auto;color:#888}
.log-line{margin:1px 0;line-height:1.5}
.log-udp{color:#60a5fa}
.log-fsm{color:#facc15}
.log-warn{color:#f97316}
.log-ok{color:#4ade80}
.flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0}
.flex-row label{font-size:12px;color:#888}
</style>
</head>
<body>

<h1>Simulador — Postes Inteligentes</h1>
<p class="sub">Projecto: Poste Inteligente · Luis Custodio | Tiago Moreno · ESP32 (ESP-IDF)</p>

<div class="section-title">estrada — 3 postes · 50m cada</div>
<div class="road" id="road"><div class="road-line"></div></div>
<div class="post-row" id="post-row"></div>

<div class="ctrl-section">
  <div class="flex-row">
    <label>carros:</label>
    <button onclick="addCar(30)">+ 30 km/h</button>
    <button onclick="addCar(50)">+ 50 km/h</button>
    <button onclick="addCar(80)">+ 80 km/h</button>
    <button onclick="addCar(120)">+ 120 km/h</button>
  </div>
  <div class="flex-row">
    <label>falhas UDP:</label>
    <button onclick="toggleFail(0)" id="fail0">falha P1</button>
    <button onclick="toggleFail(1)" id="fail1">falha P2</button>
    <button onclick="toggleFail(2)" id="fail2">falha P3</button>
  </div>
  <div class="flex-row">
    <label>falhas radar:</label>
    <button onclick="toggleRadarFail(0)" id="fradar0">radar P1</button>
    <button onclick="toggleRadarFail(1)" id="fradar1">radar P2</button>
    <button onclick="toggleRadarFail(2)" id="fradar2">radar P3</button>
  </div>
  <div class="flex-row">
    <label>velocidade simulação:</label>
    <input type="range" min="1" max="15" value="5" step="1" id="sim-spd"
      oninput="SIM_SPEED=+this.value;document.getElementById('spd-lbl').textContent=this.value+'x'">
    <span id="spd-lbl" style="font-size:12px;color:#888;min-width:28px">5x</span>
    <button onclick="resetAll()" style="margin-left:8px">reset</button>
    <button onclick="clearLog()">limpar log</button>
  </div>
</div>

<div class="section-title">log de eventos UDP / FSM</div>
<div class="log-box" id="log"></div>

<script>
const POSTE_DIST = 50;
const RADAR_HALF = 3.5;
const TRAFIC_MS  = 5000;
const N = 3;
let SIM_SPEED = 5;
let simTime = 0;
let lastTick = null;
let carId = 0;
let cars = [];
let postFail  = [false,false,false];
let radarFail = [false,false,false];

function makePost(i) {
  return { id:i+1, pos:i, T:0, Tc:0, lastSpeed:0, radarOk:true,
           radarFailCnt:0, apagPend:false, apagAt:0 };
}
let posts = Array.from({length:N}, (_,i) => makePost(i));

function postOnline(i){ return !postFail[i]; }
function leftOnline(i){ return i>0 && postOnline(i-1); }
function rightOnline(i){ return i<N-1 && postOnline(i+1); }

function getState(p,i){
  if(!postOnline(i))       return 'OFFLINE';
  if(radarFail[i])         return 'SAFE MODE';
  if(p.T>0||p.Tc>0)        return 'LIGHT ON';
  if(!leftOnline(i))       return 'MASTER';
  return 'IDLE';
}
function getBrightness(p,i){
  if(!postOnline(i))  return 10;
  if(radarFail[i])    return 50;
  if(p.T>0||p.Tc>0)   return 100;
  return 10;
}
function daliFillColor(pct){
  if(pct>=90) return '#facc15';
  if(pct>=45) return '#f97316';
  return '#374151';
}

function addLog(msg,cls){
  const box=document.getElementById('log');
  const t=(simTime/1000).toFixed(1);
  const d=document.createElement('div');
  d.className='log-line'+(cls?' log-'+cls:'');
  d.textContent=`[${t}s] ${msg}`;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  if(box.children.length>400) box.removeChild(box.firstChild);
}
function clearLog(){ document.getElementById('log').innerHTML=''; }

function renderPosts(){
  const row=document.getElementById('post-row');
  row.innerHTML='';
  const bdg={IDLE:'b-idle','LIGHT ON':'b-light','SAFE MODE':'b-safe',
             MASTER:'b-master',AUTONOMO:'b-auto',OFFLINE:'b-off'};
  posts.forEach((p,i)=>{
    const st=getState(p,i);
    const pct=getBrightness(p,i);
    const lOk=leftOnline(i);
    const rOk=rightOnline(i);
    const spd=(p.T>0||p.Tc>0)?p.lastSpeed:0;
    const div=document.createElement('div');
    div.className='post-card'+(st==='OFFLINE'?' offline':'');
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="post-name">P${p.id}</span>
        <span class="badge ${bdg[st]||'b-idle'}">${st}</span>
      </div>
      <div style="font-size:10px;color:#666;margin:2px 0">DALI ${pct}%</div>
      <div class="dali-bar"><div class="dali-fill" style="width:${pct}%;background:${daliFillColor(pct)}"></div></div>
      <div class="counters">
        <div class="cnt"><div class="cnt-lbl">T aqui</div>
          <div class="cnt-val" style="color:${p.T>0?'#facc15':'#444'}">${p.T}</div></div>
        <div class="cnt"><div class="cnt-lbl">Tc vem</div>
          <div class="cnt-val" style="color:${p.Tc>0?'#38bdf8':'#444'}">${p.Tc}</div></div>
        <div class="cnt"><div class="cnt-lbl">km/h</div>
          <div class="cnt-val" style="color:${spd>0?'#a78bfa':'#444'}">${spd}</div></div>
      </div>
      <div class="neb-row">
        <span class="${lOk?'neb-ok':'neb-off'}">${i===0?'—':'esq: '+(lOk?'OK':'OFF')}</span>
        <span style="font-size:9px;color:${radarFail[i]?'#f97316':'#555'}">
          ${radarFail[i]?'radar FALHA':'radar ok'}</span>
        <span class="${rOk?'neb-ok':'neb-off'}">${i===N-1?'—':'dir: '+(rOk?'OK':'OFF')}</span>
      </div>`;
    row.appendChild(div);
  });
}

function renderRoad(){
  const road=document.getElementById('road');
  road.querySelectorAll('.car-dot,.radar-zone,.post-pole,.post-light').forEach(e=>e.remove());
  const W=road.clientWidth||600;
  const segW=W/N;
  posts.forEach((p,i)=>{
    const x=i*segW+segW/2;
    const pct=getBrightness(p,i);
    const lc=!postOnline(i)?'#2a2a2a':radarFail[i]?'#f97316':pct>=90?'#facc15':pct>=45?'#d97706':'#2a2a2a';
    const pole=document.createElement('div');
    pole.className='post-pole';
    pole.style.cssText=`left:${x-2}px;height:${24+i*5}px`;
    road.appendChild(pole);
    const light=document.createElement('div');
    light.className='post-light';
    light.style.cssText=`left:${x-7}px;bottom:${23+i*5}px;background:${lc}`;
    road.appendChild(light);
    const rz=document.createElement('div');
    rz.className='radar-zone';
    const rw=(RADAR_HALF*2/POSTE_DIST)*segW;
    rz.style.cssText=`left:${x-rw/2}px;width:${rw}px;opacity:${radarFail[i]?0.1:1}`;
    road.appendChild(rz);
  });
  cars.forEach(car=>{
    const x=(car.x/(POSTE_DIST*N))*W;
    const dot=document.createElement('div');
    dot.className='car-dot';
    dot.style.left=`${x-10}px`;
    dot.textContent=car.speed;
    road.appendChild(dot);
  });
}

function scheduleApagar(i){
  posts[i].apagPend=true;
  posts[i].apagAt=simTime+TRAFIC_MS;
}

function checkApagar(i,p){
  if(!p.apagPend) return;
  if(p.T>0||p.Tc>0){ p.apagPend=false; return; }
  if(simTime>=p.apagAt){
    p.apagPend=false;
    p.lastSpeed=0;
    addLog(`P${p.id}: T=0 Tc=0 timeout → IDLE 10%`,'fsm');
  }
}

function simTick(ts){
  if(!lastTick) lastTick=ts;
  const dt=Math.min(ts-lastTick,100)*SIM_SPEED;
  lastTick=ts;
  simTime+=dt;
  const totalDist=POSTE_DIST*N;

  cars.forEach(car=>{
    if(!car.active) return;
    car.x+=(car.speed/3.6)*(dt/1000);
    if(car.x>totalDist+5){
      car.active=false;
      const last=N-1;
      if(!postFail[last]&&posts[last].T>0){
        posts[last].T--;
        addLog(`P${N}: carro #${car.id} saiu → T=${posts[last].T}`,'fsm');
        scheduleApagar(last);
      }
      addLog(`Carro #${car.id} (${car.speed}km/h) saiu da estrada`,'ok');
      return;
    }
    posts.forEach((p,pi)=>{
      if(!postOnline(pi)) return;
      const postX=POSTE_DIST*pi+POSTE_DIST/2;
      const inZone=Math.abs(car.x-postX)<RADAR_HALF;
      if(inZone&&!car.detected.has(pi)){
        car.detected.add(pi);
        if(radarFail[pi]){
          addLog(`P${pi+1}: radar FALHA — #${car.id} não detectado`,'warn');
          return;
        }
        if(p.Tc>0) p.Tc--;
        p.T++;
        p.lastSpeed=car.speed;
        p.apagPend=false;
        addLog(`P${pi+1}: detectou #${car.id} ${car.speed}km/h | T=${p.T} Tc=${p.Tc}`,'fsm');
        if(pi>0&&postOnline(pi-1)){
          const prev=posts[pi-1];
          if(prev.T>0) prev.T--;
          addLog(`P${pi+1}→P${pi}: TC_INC- T=${prev.T}`,'udp');
          if(prev.T<=0&&prev.Tc<=0) scheduleApagar(pi-1);
        }
        if(pi<N-1&&postOnline(pi+1)){
          const nxt=posts[pi+1];
          nxt.Tc++;
          nxt.lastSpeed=car.speed;
          nxt.apagPend=false;
          const eta=Math.round((POSTE_DIST-RADAR_HALF*2)/(car.speed/3.6)*1000);
          addLog(`P${pi+1}→P${pi+2}: TC_INC+ ${car.speed}km/h ETA=${eta}ms | Tc=${nxt.Tc}`,'udp');
        }
      }
    });
  });
  cars=cars.filter(c=>c.x<=totalDist+6);

  posts.forEach((p,i)=>{
    if(!postOnline(i)){
      p.T=0;p.Tc=0;p.apagPend=false;
      return;
    }
    checkApagar(i,p);
  });

  renderPosts();
  renderRoad();
  requestAnimationFrame(simTick);
}

function addCar(speed){
  carId++;
  cars.push({id:carId,speed,x:0,active:true,detected:new Set(),exited:new Set()});
  addLog(`Carro #${carId} entrou: ${speed} km/h`,'ok');
}

function toggleFail(i){
  postFail[i]=!postFail[i];
  document.getElementById('fail'+i).className=postFail[i]?'active-fail':'';
  addLog(`P${i+1} ${postFail[i]?'OFFLINE (falha UDP)':'voltou online'}`,postFail[i]?'warn':'ok');
  if(!postFail[i]){
    posts[i].T=0;posts[i].Tc=0;posts[i].lastSpeed=0;posts[i].apagPend=false;
    if(i===0) addLog('P1 (pos=0) volta → MASTER_CLAIM propagado','udp');
  }
}

function toggleRadarFail(i){
  radarFail[i]=!radarFail[i];
  document.getElementById('fradar'+i).className=radarFail[i]?'active-fail':'';
  addLog(`Radar P${i+1} ${radarFail[i]?'FALHOU → SAFE MODE 50%':'recuperou → IDLE'}`,radarFail[i]?'warn':'ok');
  posts[i].radarFailCnt=0;
}

function resetAll(){
  cars=[];carId=0;
  postFail=[false,false,false];
  radarFail=[false,false,false];
  posts=Array.from({length:N},(_,j)=>makePost(j));
  [0,1,2].forEach(i=>{
    document.getElementById('fail'+i).className='';
    document.getElementById('fradar'+i).className='';
  });
  addLog('Sistema reiniciado','ok');
}

renderPosts();
renderRoad();
requestAnimationFrame(simTick);
window.addEventListener('resize',renderRoad);
</script>
</body>
</html>
